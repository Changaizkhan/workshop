name: garage-assist

services:
  api:
    image: ghcr.io/changaizkhan/workshop-api:${IMAGE_TAG:-latest}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - garage-assist
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    image: ghcr.io/changaizkhan/workshop-web:${IMAGE_TAG:-latest}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - garage-assist
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  garage-assist:
    driver: bridge
