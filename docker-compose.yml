name: garage-assist

services:
  api:
    image: ghcr.io/changaizkhan/workshop-api:${IMAGE_TAG:-latest}
    container_name: garage-assist-api
    env_file:
      - .env
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    networks:
      - garage-assist
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  web:
    image: ghcr.io/changaizkhan/workshop-web:${IMAGE_TAG:-latest}
    container_name: garage-assist-web
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - garage-assist
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

networks:
  garage-assist:
    driver: bridge
